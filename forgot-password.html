<!-- forgot-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SmartTutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-container { width: 100%; max-width: 460px; margin: 0 auto; }
        .auth-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 2rem 2rem 2.5rem;
        }
        .brand { text-align: center; margin-bottom: 1.5rem; }
        .brand i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 0.5rem; display: block;
        }
        .brand h1 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .auth-card h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; color: #0f172a; text-align: center; }
        .auth-subtitle { text-align: center; color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; color: #1e293b; font-size: 0.9rem; }
        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1rem; }
        .input-icon input {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #e2e8f0; border-radius: 1rem;
            font-family: inherit; font-size: 1rem; transition: all 0.2s; background-color: #fefefe;
        }
        .input-icon input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn-primary {
            width: 100%; background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white; border: none; padding: 0.75rem; border-radius: 1rem;
            font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(59,130,246,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .auth-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #64748b; }
        .auth-link a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }
        .auth-error {
            background-color: #fee2e2; color: #b91c1c; padding: 0.75rem;
            border-radius: 0.75rem; font-size: 0.85rem; margin-bottom: 1rem;
            border-left: 4px solid #ef4444; display: none;
        }
        .auth-error.show { display: block; }
        .auth-success {
            background-color: #dcfce7; color: #166534; padding: 0.75rem;
            border-radius: 0.75rem; font-size: 0.85rem; margin-bottom: 1rem;
            border-left: 4px solid #22c55e; display: none; text-align: center;
        }
        .auth-success.show { display: block; }
        .success-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem; }
            .brand h1, .auth-card h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">
                <i class="fas fa-brain"></i>
                <h1>SmartTutor</h1>
            </div>

            <!-- Initial form view -->
            <div id="formView">
                <h2>Forgot password?</h2>
                <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
                <div id="authError" class="auth-error" aria-live="polite"></div>
                <form id="forgotForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="submitBtn">Send reset link</button>
                </form>
                <p class="auth-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to login</a></p>
            </div>

            <!-- Success view (shown after email sent) -->
            <div id="successView" style="display:none; text-align:center;">
                <span class="success-icon">📧</span>
                <h2>Check your email</h2>
                <p class="auth-subtitle" style="margin-bottom:1.5rem;">
                    We've sent a password reset link to <strong id="sentEmail"></strong>.<br><br>
                    Click the link in the email to reset your password. It may take a minute to arrive — check your spam folder too.
                </p>
                <p class="auth-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to login</a></p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qshqulmdhuwtcedrdrxq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzaHF1bG1kaHV3dGNlZHJkcnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODEwMTMsImV4cCI6MjA4OTg1NzAxM30.UY7zcNwa1xmAhiQk2i8kFAPVyq7lG2B4TzM41eCG8s0';

        let supabase = null;

        async function initSupabase() {
            if (supabase) return supabase;
            const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
            supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return supabase;
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const errorEl = document.getElementById('authError');
            const submitBtn = document.getElementById('submitBtn');

            errorEl.textContent = '';
            errorEl.classList.remove('show');

            if (!email) {
                errorEl.textContent = 'Please enter your email address.';
                errorEl.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const sb = await initSupabase();
                const { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) {
                    errorEl.textContent = error.message;
                    errorEl.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send reset link';
                    return;
                }

                // Show success regardless (don't reveal if email exists)
                document.getElementById('sentEmail').textContent = email;
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';

            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send reset link';
            }
        });
    </script>
</body>
</html>
