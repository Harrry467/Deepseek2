<!-- Use same navbar, auth container, but signup form -->
<form id="signupForm">
    <div class="input-group"><label>Full Name</label><input type="text" id="name" required></div>
    <div class="input-group"><label>Email</label><input type="email" id="email" required></div>
    <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
    <div class="input-group"><label>Confirm Password</label><input type="password" id="confirmPassword" required></div>
    <button type="submit" class="btn-primary">Sign up</button>
</form>
<p>Already have an account? <a href="login.html">Log in</a></p>
