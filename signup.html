<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – SmartTutor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="auth-subtitle">Start practising smarter today</p>

      <p id="authError" class="auth-error" aria-live="polite"></p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" autocomplete="name" required placeholder="Your name" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Min. 6 characters" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required placeholder="Repeat password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create account</button>
      </form>

      <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof redirectIfLoggedIn === 'function') redirectIfLoggedIn();
    });
  </script>
</body>
</html>
