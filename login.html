<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartTutor</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Global Styles (optional, keeps consistency) -->
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        .auth-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem 2rem 2.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }

        .brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #0f172a;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .input-icon input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            background-color: #fefefe;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-icon input:focus + i {
            color: #3b82f6;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .auth-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .auth-error {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border-left: 4px solid #ef4444;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        /* Toast popup for wrong password */
        .toast-popup {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e293b;
            color: white;
            padding: 0.9rem 1.5rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
        }

        .toast-popup.toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .toast-popup.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-popup i {
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
            .brand h1 {
                font-size: 1.5rem;
            }
            .auth-card h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">
                <i class="fas fa-brain"></i>
                <h1>SmartTutor</h1>
            </div>
            <h2>Welcome back</h2>
            <p class="auth-subtitle">Log in to continue your learning journey</p>
            <div id="authError" class="auth-error" aria-live="polite"></div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div style="text-align:right; margin-top:-0.75rem; margin-bottom:0.5rem;"><a href="forgot-password.html" style="font-size:0.85rem; color:#3b82f6; text-decoration:none; font-weight:500;">Forgot password?</a></div>
                <button type="submit" class="btn-primary">Log in</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        // Toast helper
        function showToast(message, type = 'error') {
            let toast = document.getElementById('toastPopup');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toastPopup';
                toast.className = 'toast-popup';
                document.body.appendChild(toast);
            }
            toast.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            toast.className = `toast-popup toast-${type}`;
            // Force reflow
            toast.offsetHeight;
            toast.classList.add('show');
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // Override login error to also show toast
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof redirectIfLoggedIn === 'function') redirectIfLoggedIn();

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email')?.value?.trim();
                    const password = document.getElementById('password')?.value;
                    const errorEl = document.getElementById('authError');
                    if (errorEl) { errorEl.textContent = ''; errorEl.classList.remove('show'); }

                    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                    const sb = createClient(
                        'https://qshqulmdhuwtcedrdrxq.supabase.co',
                        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzaHF1bG1kaHV3dGNlZHJkcnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODEwMTMsImV4cCI6MjA4OTg1NzAxM30.UY7zcNwa1xmAhiQk2i8kFAPVyq7lG2B4TzM41eCG8s0'
                    );

                    const { error } = await sb.auth.signInWithPassword({ email, password });

                    if (error) {
                        const msg = error.message?.toLowerCase().includes('invalid') || error.message?.toLowerCase().includes('credentials')
                            ? 'Incorrect password or account does not exist'
                            : error.message || 'Login failed. Please try again.';
                        showToast(msg);
                        if (errorEl) { errorEl.textContent = msg; errorEl.classList.add('show'); }
                        // Shake the card
                        document.querySelector('.auth-card').style.animation = 'none';
                        setTimeout(() => {
                            document.querySelector('.auth-card').style.animation = 'shake 0.4s ease';
                        }, 10);
                        return;
                    }
                    window.location.href = 'dashboard.html';
                }, { once: false });
            }
        });

        // Shake animation
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }`;
        document.head.appendChild(shakeStyle);

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.querySelector('i').classList.toggle('fa-eye');
                togglePassword.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }
    </script>
</body>
</html>
