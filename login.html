<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – SmartTutor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-subtitle">Log in to your SmartTutor account</p>

      <p id="authError" class="auth-error" aria-live="polite"></p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Log in</button>
      </form>

      <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof redirectIfLoggedIn === 'function') redirectIfLoggedIn();
    });
  </script>
</body>
</html>
